# ── Multi-Cloud k3s Cluster Specification ──
# Single source of truth: what clusters exist, where, and how big.
# Pulumi reads this to provision. ArgoCD uses per-cluster values
# in 2143-59s/clusters/<cloud>-<region>/ for Helm overrides.

version: 2

# ── Global defaults (overridable per-cluster) ──
defaults:
  image: ubuntu-24.04
  ssh_key_name: k3s-cloud
  tags:
    - "k3s"
    - "john2143"
    - "managed-by-pulumi"

# ── Cloud provider credentials ──
providers:
  hetzner:
    token_env: HCLOUD_TOKEN
  digitalocean:
    token_env: DIGITALOCEAN_TOKEN

# ── Cluster definitions ──
clusters:
  - name: hetzner-ashburn-k3s
    cloud: hetzner
    region: ashburn
    geo_tag: us-ashburn
    floating_ip: true
    labels:
      k3s: "true"
      owner: "john2143"
      managed-by: "pulumi"
      role: "k3s-server"
    nodes:
      - role: server
        size: cpx21

  - name: hetzner-hillsboro-k3s
    cloud: hetzner
    region: hillsboro
    geo_tag: us-hillsboro
    floating_ip: true
    labels:
      k3s: "true"
      owner: "john2143"
      managed-by: "pulumi"
      role: "k3s-server"
    nodes:
      - role: server
        size: cpx31

  - name: do-nyc-k3s
    cloud: digitalocean
    region: nyc1
    geo_tag: us-nyc
    floating_ip: true
    image: ubuntu-24-04-x64
    tags:
      - "k3s"
      - "john2143"
      - "managed-by-pulumi"
      - "k3s-server"
    nodes:
      - role: server
        size: s-2vcpu-4gb