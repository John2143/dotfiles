name: Build and push frigate-genai images

on:
  push:
    paths:
      - nixos/modules/frigate-genai-sidecar.py
      - nixos/modules/frigate.nix
      - flake.nix
      - flake.lock
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build genai image
        run: nix build .#frigate-genai-genai-image --out-link result-genai

      - name: Build ffmpeg image
        run: nix build .#frigate-genai-ffmpeg-image --out-link result-ffmpeg

      - name: Push to ghcr.io
        run: |
          OWNER_LOWER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')

          # skopeo needs v2 registries.conf — GHA runner has v1
          mkdir -p /tmp/empty-reg
          echo '{}' > /tmp/empty-reg/registries.conf

          REGISTRIES_CONFIG_PATH=/tmp/empty-reg nix shell nixpkgs#skopeo -c \
            skopeo copy --dest-creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:result-genai \
            docker://ghcr.io/${OWNER_LOWER}/frigate-genai-genai:v${{ github.run_number }}

          REGISTRIES_CONFIG_PATH=/tmp/empty-reg nix shell nixpkgs#skopeo -c \
            skopeo copy --dest-creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:result-ffmpeg \
            docker://ghcr.io/${OWNER_LOWER}/frigate-genai-ffmpeg:v${{ github.run_number }}

          REGISTRIES_CONFIG_PATH=/tmp/empty-reg nix shell nixpkgs#skopeo -c \
            skopeo copy --dest-creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:result-genai \
            docker://ghcr.io/${OWNER_LOWER}/frigate-genai-genai:latest

          REGISTRIES_CONFIG_PATH=/tmp/empty-reg nix shell nixpkgs#skopeo -c \
            skopeo copy --dest-creds="${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}" \
            docker-archive:result-ffmpeg \
            docker://ghcr.io/${OWNER_LOWER}/frigate-genai-ffmpeg:latest