name: Build and push frigate-genai images

on:
  push:
    paths:
      - nixos/modules/frigate-genai-sidecar.py
      - nixos/modules/frigate.nix
      - flake.nix
      - flake.lock
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Unshallow git history
        run: git fetch --unshallow || true

      - uses: cachix/install-nix-action@v27
        with:
          nix_path: nixpkgs=channel:nixos-unstable

      - name: Build genai image
        run: nix build .#frigate-genai-genai-image --out-link result-genai

      - name: Build ffmpeg image
        run: nix build .#frigate-genai-ffmpeg-image --out-link result-ffmpeg

      - name: Push to ghcr.io
        env:
          REGISTRIES_CONFIG_PATH: /tmp
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
            nix shell nixpkgs#skopeo -c skopeo login ghcr.io \
            -u ${{ github.actor }} --password-stdin

          nix shell nixpkgs#skopeo -c skopeo copy \
            docker-archive:result-genai \
            docker://ghcr.io/${{ github.repository_owner }}/frigate-genai-genai:v${{ github.run_number }} \
            --dest-tls-verify=true

          nix shell nixpkgs#skopeo -c skopeo copy \
            docker-archive:result-ffmpeg \
            docker://ghcr.io/${{ github.repository_owner }}/frigate-genai-ffmpeg:v${{ github.run_number }} \
            --dest-tls-verify=true

          # Also tag as latest
          nix shell nixpkgs#skopeo -c skopeo copy \
            docker-archive:result-genai \
            docker://ghcr.io/${{ github.repository_owner }}/frigate-genai-genai:latest \
            --dest-tls-verify=true

          nix shell nixpkgs#skopeo -c skopeo copy \
            docker-archive:result-ffmpeg \
            docker://ghcr.io/${{ github.repository_owner }}/frigate-genai-ffmpeg:latest \
            --dest-tls-verify=true
